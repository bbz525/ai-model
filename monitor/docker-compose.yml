version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: monitor-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: serve
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  qqbot:
    build: .
    container_name: monitor-qqbot
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8083:8083"
    volumes:
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
    command: python qq_chat.py
    environment:
      - OLLAMA_API=http://ollama:11434/api/generate

  detector:
    build: .
    container_name: monitor-detector
    restart: unless-stopped
    depends_on:
      - ollama
      - qqbot
    volumes:
      - ./.env:/app/.env:ro
      - ./logs:/app/logs
      - /dev/video0:/dev/video0  # USB 摄像头
      # - /tmp/.X11-unix:/tmp/.X11-unix  # X11 转发（GUI 调试）
    command: python img_detect.py
    devices:
      - /dev/video0:/dev/video0  # USB 摄像头设备
    environment:
      - OLLAMA_API=http://ollama:11434/api/generate
      - DISPLAY=${DISPLAY:-:0}  # X11 显示
    privileged: true  # 需要访问 USB 设备

volumes:
  ollama_data: